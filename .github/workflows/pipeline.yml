# Pipeline CI/CD: De 'git push' a producción en AWS.
# Este archivo es el "Robot" de la masterclass.
#
# Arquitectura del pipeline:
#   Job 1 (infra):    Terraform construye la infraestructura en AWS       [solo en push]
#   Job 2 (config):   Ansible configura los servidores (depende de infra) [solo en push]
#   Job 3 (destruir): Elimina toda la infraestructura                     [solo manual]
#
# Separacion de responsabilidades:
#   push a main     -> corre infra + config (construir)
#   workflow_dispatch -> corre SOLO destruir (destruir)
# Esto evita que infra y destruir corran en paralelo y se bloqueen mutuamente
# via el Terraform state lock en S3.

name: "Pipeline CI/CD: Masterclass Terraform + Ansible"

on:
  push:
    branches:
      - main  # El pipeline se activa solo con cambios en la rama principal
  workflow_dispatch:
    inputs:
      confirmar:
        description: "Marcar para confirmar la destruccion de toda la infraestructura AWS"
        required: true
        type: boolean
        default: false

jobs:
  # ============================================================
  # JOB 1: INFRAESTRUCTURA
  # Responsabilidad: construir la red, servidores y seguridad en AWS
  # ============================================================
  infra:
    name: "Fase 1: Provisionar Infraestructura (Terraform)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    # Los outputs permiten pasar datos entre jobs.
    # Sin esto, 'config' no sabría a qué IPs conectarse.
    outputs:
      frontend_ip:        ${{ steps.tf_outputs.outputs.frontend_ip }}
      backend_private_ip: ${{ steps.tf_outputs.outputs.backend_private_ip }}

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v7

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Instalar Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.0"
          # terraform_wrapper: false es necesario para capturar outputs
          # sin el wrapper de HashiCorp que agrega metadata al stdout
          terraform_wrapper: false

      - name: Inicializar Terraform (conectar con backend S3)
        working-directory: terraform/
        run: terraform init

      - name: Planificar cambios de infraestructura
        working-directory: terraform/
        run: terraform plan -out=tfplan

      - name: Aplicar infraestructura
        working-directory: terraform/
        run: terraform apply -auto-approve tfplan
        # Todas las variables tienen valores por defecto en variables.tf.
        # No se requieren TF_VAR_* ni terraform.tfvars para este despliegue.

      - name: Capturar outputs de Terraform como outputs del job
        id: tf_outputs
        working-directory: terraform/
        run: |
          echo "frontend_ip=$(terraform output -raw frontend_ip)" >> "$GITHUB_OUTPUT"
          echo "backend_private_ip=$(terraform output -raw backend_private_ip)" >> "$GITHUB_OUTPUT"

      - name: Mostrar URL final (preview para el equipo)
        run: |
          echo "=== INFRAESTRUCTURA LISTA ==="
          echo "Frontend IP:        ${{ steps.tf_outputs.outputs.frontend_ip }}"
          echo "Backend Private IP: ${{ steps.tf_outputs.outputs.backend_private_ip }}"
          echo "URL de la app:      http://${{ steps.tf_outputs.outputs.frontend_ip }}/"

  # ============================================================
  # JOB 2: CONFIGURACIÓN
  # Responsabilidad: configurar los servidores que Terraform creó
  # ============================================================
  config:
    name: "Fase 2: Configurar Servidores (Ansible)"
    needs: [infra]  # Garantiza que infra terminó exitosamente antes de correr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v7

      - name: Instalar Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Configurar clave SSH y ProxyJump para acceso a instancias EC2
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # ProxyJump via ~/.ssh/config evita el bug "UNKNOWN port 65535" de OpenSSH.
          # Se usa printf en lugar de heredoc: el contenido sin indentar del heredoc
          # rompe el parse YAML del runner (las lineas "Host ..." quedan fuera del
          # bloque run: | al tener 0 espacios de indentacion).
          FRONTEND_IP="${{ needs.infra.outputs.frontend_ip }}"
          BACKEND_IP="${{ needs.infra.outputs.backend_private_ip }}"
          {
            printf 'Host %s\n  User ubuntu\n  IdentityFile ~/.ssh/id_rsa\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n\n' "${FRONTEND_IP}"
            printf 'Host %s\n  User ubuntu\n  IdentityFile ~/.ssh/id_rsa\n  ProxyJump ubuntu@%s\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n\n' "${BACKEND_IP}" "${FRONTEND_IP}"
            printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Crear inventario dinámico desde outputs de Terraform
        run: |
          # Puente entre Terraform y Ansible: IPs de los outputs del job 'infra'.
          # ProxyJump ya esta en ~/.ssh/config — no se necesita ansible_ssh_common_args.
          FRONTEND_IP="${{ needs.infra.outputs.frontend_ip }}"
          BACKEND_IP="${{ needs.infra.outputs.backend_private_ip }}"
          printf '[frontend]\n%s ansible_user=ubuntu\n\n[backend]\n%s ansible_user=ubuntu\n' \
            "${FRONTEND_IP}" "${BACKEND_IP}" > inventory.ini
          printf '=== Inventario generado ===\n'
          cat inventory.ini

      - name: Esperar a que las instancias EC2 estén listas para SSH
        run: |
          # AWS necesita ~30-60 segundos para que cloud-init termine y SSH esté activo.
          # Sin esta espera, Ansible falla con "Connection refused".
          echo "Esperando 60 segundos para que las instancias inicialicen..."
          sleep 60

      - name: Ejecutar playbook de Ansible
        run: |
          ansible-playbook \
            --inventory inventory.ini \
            --private-key ~/.ssh/id_rsa \
            --extra-vars "backend_private_ip=${{ needs.infra.outputs.backend_private_ip }}" \
            ansible/playbook.yml

      - name: Verificar que la app responde correctamente
        run: |
          echo "=== VERIFICACION FINAL ==="
          # Esperamos hasta 2 minutos para que Nginx esté listo
          for i in {1..12}; do
            if curl -s -o /dev/null -w "%{http_code}" \
                http://${{ needs.infra.outputs.frontend_ip }}/ | grep -q "200"; then
              echo "[OK] App respondiendo en http://${{ needs.infra.outputs.frontend_ip }}/"
              curl -s http://${{ needs.infra.outputs.frontend_ip }}/ | python3 -m json.tool
              exit 0
            fi
            echo "Intento $i/12: esperando 10 segundos..."
            sleep 10
          done
          echo "[FAIL] La app no respondio en el tiempo esperado"
          exit 1

  # ============================================================
  # JOB 3: DESTRUIR INFRAESTRUCTURA (activacion manual)
  # Uso: Actions -> Pipeline CI/CD -> Run workflow -> marcar checkbox -> Run workflow
  # Proposito: evitar costos de AWS cuando el demo ha terminado
  # ============================================================
  destruir:
    name: "Fase 3: Destruir Infraestructura (Manual)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirmar == 'true'

    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v7

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Instalar Terraform CLI
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.0"
          terraform_wrapper: false

      - name: Inicializar Terraform (conectar con backend S3)
        working-directory: terraform/
        run: terraform init

      - name: Destruir toda la infraestructura
        working-directory: terraform/
        run: |
          echo "=== DESTRUYENDO INFRAESTRUCTURA ==="
          terraform destroy -auto-approve
          echo "=== INFRAESTRUCTURA ELIMINADA ==="
